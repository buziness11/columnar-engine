name: Build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libgoogle-glog-dev \  # glog
          libgtest-dev \        # gtest headers
          libgmock-dev \        # gmock
          clang-format \
          clang-tidy \
          git \
          wget \
          pkg-config
    
    - name: Build and install GTest/GMock from source
      run: |
        # GTest часто требует сборки из исходников
        cd /usr/src/gtest
        sudo cmake .
        sudo make
        sudo cp lib/*.a /usr/lib
        
        # GMock тоже
        cd /usr/src/gmock
        sudo cmake .
        sudo make
        sudo cp lib/*.a /usr/lib
    
    - name: Configure with CMake
      run: |
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Debug ..
    
    - name: Build project
      run: |
        cd build
        make -j$(nproc)
        ls -la  # покажем что собралось
    
    - name: Run tests
      run: |
        cd build
        ./tests/unit_tests
